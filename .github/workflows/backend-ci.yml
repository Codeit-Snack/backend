name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: snack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI environment file
        run: cp .env.ci .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snack/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
