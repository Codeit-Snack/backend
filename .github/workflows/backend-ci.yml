name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    # prisma.config.ts 에도 CI용 기본값 있음(명시만 해둠)
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci_placeholder
    defaults:
      run:
        working-directory: snack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snack/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
