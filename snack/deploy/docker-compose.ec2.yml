# 루트에서: docker compose -f deploy/docker-compose.ec2.yml up -d --build
services:
  snack-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: snack-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
