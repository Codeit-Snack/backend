# 루트에서: docker compose -f deploy/docker-compose.ec2.yml up -d --build
# Redis는 기본 네트워크 내부 전용(호스트 포트 미노출). 호스트에서 필요 시: docker exec -it snack-redis redis-cli
# snack-api 의 REDIS_HOST 기본은 서비스명 redis (.env 로 덮어쓸 수 있음)

services:
  redis:
    image: redis:7-alpine
    container_name: snack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_ec2_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  snack-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: snack-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  redis_ec2_data:
